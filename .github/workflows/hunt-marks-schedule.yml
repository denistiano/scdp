# Scrape hunt marks → rebuild /website → deploy to GitHub Pages (nothing committed).
#
# Pages: Settings → Pages → Source = "GitHub Actions".
#
# Schedule: every 5 minutes (UTC) for testing; relax the cron later.
#
# Repo must contain source inputs: booking_content.json, hunting_hero_images/,
# booking_images/, booking_files/ (from crawl_booking_site.sh when you refresh content).

name: Hunt marks — scrape, rebuild, deploy

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
  repository_dispatch:
    types: [refresh-hunt-marks]
  push:
    branches:
      - main
      - master
    paths:
      - 'build_from_json.py'
      - 'crawl_hunt_marks.py'
      - 'booking_content.json'
      - 'crawl_booking_site.sh'
      - 'download_hunting_images.sh'
      - 'hunting_hero_images/**'
      - 'booking_images/**'
      - 'booking_files/**'

concurrency:
  group: hunt-marks-refresh
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --disable-pip-version-check -q requests beautifulsoup4

      - name: Scrape hunt marks
        run: python3 crawl_hunt_marks.py

      - name: Rebuild website
        run: python3 build_from_json.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
